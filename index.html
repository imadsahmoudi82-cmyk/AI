<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Design - IMAD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #050505, #121212, #1a1a2e, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 500;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-input-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 10px 15px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .chat-input-container:focus-within {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        }

        .action-btn {
            background: none;
            border: none;
            color: #b0b0b0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
            transition: 0.2s;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .send-btn {
            color: #5ab2ff;
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 12px 5px;
            resize: none;
            max-height: 200px;
            line-height: 1.4;
        }

        #error-message {
            margin-top: 15px;
            color: #ff5e5e;
            font-size: 0.95rem;
            font-weight: 400;
            opacity: 0;
            transition: 0.3s;
        }

        .visible {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مرحباً بك، كيف أساعدك؟</h1>
        
        <div class="chat-input-container">
            <button class="action-btn" onclick="showMsg()">
                <i class="fa-solid fa-plus"></i>
            </button>

            <textarea id="ai-input" placeholder="اسأل Gemini..." rows="1"></textarea>

            <button class="action-btn send-btn" onclick="showMsg()">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>

        <p id="error-message">عذراً، هذه الميزة غير متوفرة حالياً</p>
    </div>

    <script>
        const textarea = document.getElementById('ai-input');
        const error = document.getElementById('error-message');

        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function showMsg() {
            error.classList.add('visible');
            setTimeout(() => {
                error.classList.remove('visible');
            }, 3000);
        }
    </script>
</body>
</html>
