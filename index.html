<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interface - IMAD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #09090b, #11111d, #0f172a, #09090b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 850px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 2.5rem;
            background: linear-gradient(to right, #7dd3fc, #38bdf8, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .input-wrapper {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .input-wrapper:focus-within {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f1f5f9;
            font-size: 1.15rem;
            resize: none;
            padding: 8px 0;
            line-height: 1.5;
        }

        .btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        .btn:hover {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }

        .send-btn {
            color: #38bdf8;
        }

        #status-msg {
            margin-top: 25px;
            font-size: 1rem;
            color: #fb7185;
            font-weight: 500;
            height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .show-msg {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>بمَ يمكنني مساعدتك؟</h1>
        
        <div class="input-wrapper">
            <button class="btn" onclick="trigger()">
                <i class="fa-regular fa-image"></i>
            </button>

            <textarea id="inputField" placeholder="اسألني أي شيء..." rows="1"></textarea>

            <button class="btn send-btn" onclick="trigger()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <p id="status-msg">عذراً، هذه الميزة غير متوفرة حالياً</p>
    </div>

    <script>
        const input = document.getElementById('inputField');
        const msg = document.getElementById('status-msg');

        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function trigger() {
            msg.classList.add('show-msg');
            setTimeout(() => {
                msg.classList.remove('show-msg');
            }, 2500);
        }
    </script>
</body>
</html>
